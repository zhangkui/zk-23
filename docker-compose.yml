version: '3.8'

services:
  clickhouse:
    image: clickhouse/clickhouse-server:24.1
    container_name: cableway-clickhouse
    restart: unless-stopped
    environment:
      - CLICKHOUSE_DB=cableway_monitor
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-clickhouse_pass}
      - TZ=Asia/Shanghai
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./deploy/clickhouse/config.xml:/etc/clickhouse-server/config.d/local.xml
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 30s

  nats:
    image: nats:2.10-alpine
    container_name: cableway-nats
    restart: unless-stopped
    command:
      - "--jetstream"
      - "--http_port"
      - "8222"
      - "--user"
      - "${NATS_USER:-nats}"
      - "--pass"
      - "${NATS_PASSWORD:-nats_pass}"
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - nats_data:/data
      - ./deploy/nats/nats.conf:/etc/nats/nats.conf
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8222/healthz"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7.2-alpine
    container_name: cableway-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_pass} --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cableway-backend
    restart: unless-stopped
    environment:
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=8080
      - CLICKHOUSE_URL=http://clickhouse:8123
      - CLICKHOUSE_DATABASE=cableway_monitor
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-clickhouse_pass}
      - NATS_URL=nats://${NATS_USER:-nats}:${NATS_PASSWORD:-nats_pass}@nats:4222
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis_pass}@redis:6379
      - JWT_SECRET=${JWT_SECRET:-super_secret_jwt_key_change_in_production}
      - JWT_EXPIRE_HOURS=24
      - SYSTEM_ICE_THICKNESS_THRESHOLD=15
      - SYSTEM_WIND_SPEED_THRESHOLD=20
      - SYSTEM_VIBRATION_THRESHOLD=0.3
      - NODE_ID=edge-node-001
      - NODE_NAME=景区边缘节点
      - NODE_LOCATION=主索道
      - TZ=Asia/Shanghai
    ports:
      - "8080:8080"
    depends_on:
      clickhouse:
        condition: service_healthy
      nats:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./deploy/backend/.env:/app/.env
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cableway-frontend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - API_BASE_URL=http://backend:8080
      - WS_BASE_URL=ws://backend:8080
      - TZ=Asia/Shanghai
    ports:
      - "3000:3000"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 15s

  nginx:
    image: nginx:1.25-alpine
    container_name: cableway-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./deploy/nginx/conf.d:/etc/nginx/conf.d
      - ./deploy/nginx/ssl:/etc/nginx/ssl
    depends_on:
      - frontend
      - backend
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

volumes:
  clickhouse_data:
  nats_data:
  redis_data:
