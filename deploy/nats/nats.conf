listen: 0.0.0.0:4222
http: 0.0.0.0:8222

jetstream {
    store_dir: "/data"

    max_memory_store: 1GB
    max_file_store: 10GB

    streams: [
        {
            name: "SENSOR_DATA"
            subjects: ["sensor.>", "data.>"]
            retention: limits
            max_msgs: 1000000
            max_age: 7d
            max_bytes: 5GB
            storage: file
        },
        {
            name: "ALERTS"
            subjects: ["alert.>", "notification.>"]
            retention: limits
            max_msgs: 100000
            max_age: 30d
            max_bytes: 1GB
            storage: file
        },
        {
            name: "EVENTS"
            subjects: ["event.>", "system.>"]
            retention: limits
            max_msgs: 100000
            max_age: 30d
            max_bytes: 1GB
            storage: file
        }
    ]

    consumers: [
        {
            stream_name: "SENSOR_DATA"
            name: "data_processor"
            durable_name: "data_processor"
            deliver_all: true
            ack_policy: explicit
            max_deliver: 3
        },
        {
            stream_name: "ALERTS"
            name: "alert_handler"
            durable_name: "alert_handler"
            deliver_all: true
            ack_policy: explicit
            max_deliver: 5
        }
    ]
}

cluster {
    name: "cableway_cluster"
    listen: 0.0.0.0:6222
}

accounts: {
    $SYS: {
        users: [{user: sys, pass: sys_pass}]
    }
}

authorization {
    timeout: 2s
}

lame_duck_duration: "30s"
lame_duck_grace_period: "10s"

tls {
    cert_file: "/etc/nats/certs/server-cert.pem"
    key_file: "/etc/nats/certs/server-key.pem"
    ca_file: "/etc/nats/certs/ca-cert.pem"
}

log_file: "/var/log/nats/nats.log"
log_size_limit: 1GB
log_file_max_age: 7d
